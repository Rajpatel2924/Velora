<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <meta name="theme-color" content="#0f172a" />

    <meta
      name="description"
      content="Velora - AI-powered mental wellness companion for Gen Z."
    />

    <meta
      property="og:title"
      content="Velora | Mental Wellness Companion"
    />

    <meta
      property="og:description"
      content="Track moods, journal thoughts, meditate, and improve your mental wellness with Velora."
    />

    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true
      );
    </script>

    <title>Velora | Mental Wellness Companion</title>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run Velora.
    </noscript>

    <div id="root"></div>
  </body>
</html>
